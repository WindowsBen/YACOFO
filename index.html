<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Overlay Configurator</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #18181b; color: white; }
        .container { max-width: 400px; margin: 0 auto; background: #27272b; padding: 20px; border-radius: 8px; }
        label { display: block; margin-top: 10px; font-weight: bold; }
        input[type="text"],
        input[type="number"],
        input[type="color"] { width: 100%; padding: 8px; margin-top: 5px; box-sizing: border-box; }
        .section-label { margin-top: 20px; font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em; color: #aaa; }
        .checkbox-row { display: flex; align-items: center; gap: 10px; margin-top: 10px; font-weight: normal; cursor: pointer; }
        .checkbox-row input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; accent-color: #9146FF; flex-shrink: 0; }
        button { margin-top: 20px; width: 100%; padding: 10px; background: #9146FF; color: white; border: none; cursor: pointer; border-radius: 4px; font-weight: bold; }
        button:hover { background: #772ce8; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Configure Overlay</h2>

        <label>Twitch Channel Name:</label>
        <input type="text" id="channel" placeholder="e.g., xQc">

        <label>Font Size (px):</label>
        <input type="number" id="fontSize" value="16">

        <label>Text Shadow Color:</label>
        <input type="color" id="shadowColor" value="#000000">

        <div class="section-label">Emote Notifications</div>

        <label class="checkbox-row">
            <input type="checkbox" id="toastAdd" checked>
            Show pop-up when an emote is <strong>added</strong>
        </label>

        <label class="checkbox-row">
            <input type="checkbox" id="toastRemove" checked>
            Show pop-up when an emote is <strong>removed</strong>
        </label>

        <button onclick="generateLink()">Generate Link</button>

        <label>Your OBS Browser Source Link:</label>
        <input type="text" id="resultLink" readonly>
    </div>

    <script>
        function generateLink() {
            const channel = document.getElementById('channel').value;
            const fontSize = document.getElementById('fontSize').value;
            const shadowColor = document.getElementById('shadowColor').value;
            const toastAdd = document.getElementById('toastAdd').checked ? '1' : '0';
            const toastRemove = document.getElementById('toastRemove').checked ? '1' : '0';

            const currentUrl = window.location.href.replace('index.html', '');
            const finalUrl = `${currentUrl}overlay.html?channel=${channel}&fontSize=${fontSize}px&shadow=${shadowColor}&toastAdd=${toastAdd}&toastRemove=${toastRemove}`;

            document.getElementById('resultLink').value = finalUrl;
        }
    </script>
</body>
</html>
